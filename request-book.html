<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request For a Book</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cyan: rgb(0, 250, 250);
            --cyan-dim: rgba(0, 250, 250, 0.12);
            --cyan-border: rgba(0, 250, 250, 0.2);
            --bg: #111111;
            --bg-card: #181818;
            --bg-section: #141414;
            --text: #f0fafa;
            --text-muted: #888;
            --border: #2a2a2a;
            --blue: #2563eb;
            --blue-hover: #1d4ed8;
            --red: #dc2626;
            --red-hover: #b91c1c;
            --radius: 12px;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #contact {
            background: var(--bg-section);
            border-top: 1px solid var(--border);
        }

        .contact-form-wrap {
            max-width: 640px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        input,
        textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--text);
            font-family: "Inter", sans-serif;
            transition:
                border-color 0.2s,
                box-shadow 0.2s;
            outline: none;
            width: 100%;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
        }

        input:focus,
        textarea:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px var(--cyan-dim);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            margin-top: 8px;
        }

        section {
            padding: 60px 20px;
        }

        .section-title,
        .section-subtitle {
            text-align: center;
            margin: 8px;
        }
    </style>
</head>

<body>
    <section id="contact">
        <div class="container">
            <form action="https://formsubmit.co/sakshamsrivastav779@gmail.com" method="post">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://skstudybooks.netlify.app/thanks.html">
                <h2 class="section-title fade-in">Request a Book</h2>
                <p class="section-subtitle fade-in">Fill out the form below and we will provide the book as soon as
                    possible.</p>
                <div class="contact-form-wrap fade-in">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" placeholder="John Doe" />
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="john@example.com" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="message">Book Title</label>
                        <textarea id="message" placeholder="Enter the title of the book you're looking for."></textarea>
                    </div>
                    <button class="btn btn-cyan btn-submit" onclick="handleSubmit()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                        Send Message
                    </button>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
